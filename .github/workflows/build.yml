name: Build profile matrix

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".gitmodules"
      - "apps"
      - "nuttx"
      - "sources.lock.json"
      - "patches/**"
      - "overlays/**"
      - "profiles/**"
      - "scripts/**"
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - ".gitmodules"
      - "apps"
      - "nuttx"
      - "sources.lock.json"
      - "patches/**"
      - "overlays/**"
      - "profiles/**"
      - "scripts/**"

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  profiles:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
      - id: matrix
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [[ -n ${BASE_SHA:-} && $BASE_SHA != 0000000000000000000000000000000000000000 ]] && \
             git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            matrix=$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA" | scripts/ci-profile-matrix.py --stdin)
          else
            matrix=$(scripts/check-profiles.py --list)
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/cache@v4
        with:
          path: |
            build/deps
            build/source-cache
          key: build-inputs-v2-${{ runner.os }}-${{ hashFiles('sources.lock.json') }}

      - name: Reject shared failures before starting the build matrix
        run: |
          scripts/bootstrap.sh
          scripts/check-credentials.py
          scripts/check-patches.sh

  build:
    needs: [profiles, preflight]
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJSON(needs.profiles.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - uses: actions/cache@v4
        with:
          path: |
            build/deps
            build/source-cache
          key: build-inputs-v2-${{ runner.os }}-${{ hashFiles('sources.lock.json') }}

      - name: Build ${{ matrix.profile }}
        env:
          NUTTX_RP2350_VERSION: ci-${{ github.sha }}
        run: scripts/build-profile.sh "${{ matrix.profile }}" --container

      - name: Prove the build leaves the checkout clean
        run: git status --porcelain=v1 --untracked-files=all | tee /tmp/status && test ! -s /tmp/status

      - uses: actions/upload-artifact@v4
        with:
          name: uf2-${{ matrix.profile }}
          path: |
            dist/*-${{ matrix.profile }}.uf2
            dist/build-records/${{ matrix.profile }}.json
          if-no-files-found: error
          retention-days: 14

  sd-transports:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        profile:
          - fruit-jam-network
          - fruit-jam-trmnl
          - fruit-jam-doom
          - fruit-jam-full
          - fruit-jam-full-fruitclaw
        mode: [spi, pio]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - uses: actions/cache@v4
        with:
          path: |
            build/deps
            build/source-cache
          key: build-inputs-v2-${{ runner.os }}-${{ hashFiles('sources.lock.json') }}

      - name: Build ${{ matrix.profile }} with ${{ matrix.mode }} SD
        env:
          NUTTX_RP2350_VERSION: ci-${{ github.sha }}
        run: >-
          scripts/build-profile.sh "${{ matrix.profile }}" --container
          --dev-sd-mode "${{ matrix.mode }}"

      - name: Prove the SD-mode build leaves the checkout clean
        run: git status --porcelain=v1 --untracked-files=all | tee /tmp/status && test ! -s /tmp/status
