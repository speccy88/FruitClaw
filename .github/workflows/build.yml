name: Build profile matrix

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".gitmodules"
      - "apps"
      - "nuttx"
      - "sources.lock.json"
      - "patches/**"
      - "overlays/**"
      - "profiles/**"
      - "scripts/**"
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - ".gitmodules"
      - "apps"
      - "nuttx"
      - "sources.lock.json"
      - "patches/**"
      - "overlays/**"
      - "profiles/**"
      - "scripts/**"

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  profiles:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - id: matrix
        run: echo "matrix=$(scripts/check-profiles.py --list)" >> "$GITHUB_OUTPUT"

  build:
    needs: profiles
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJSON(needs.profiles.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate source pins
        run: scripts/bootstrap.sh --check

      - name: Build ${{ matrix.profile }}
        env:
          NUTTX_RP2350_VERSION: ci-${{ github.sha }}
        run: scripts/build-profile.sh "${{ matrix.profile }}" --container

      - name: Prove the build leaves the checkout clean
        run: git status --porcelain=v1 --untracked-files=all | tee /tmp/status && test ! -s /tmp/status

      - uses: actions/upload-artifact@v4
        with:
          name: uf2-${{ matrix.profile }}
          path: |
            dist/*-${{ matrix.profile }}.uf2
            dist/build-records/${{ matrix.profile }}.json
          if-no-files-found: error
          retention-days: 14
